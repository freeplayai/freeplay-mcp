[project]
name = "freeplay-mcp"
version = "0.1.0"
description = "Workflow-oriented MCP server for the Freeplay API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28.1",
    "mcp[cli]>=1.26.0",
]

[project.scripts]
freeplay-mcp = "freeplay_mcp.server:main"

[dependency-groups]
dev = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/freeplay_mcp"]
