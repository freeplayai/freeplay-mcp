name: Publish to PyPI

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.0"

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Type checking
        run: make type-check

      - name: Lint checking
        run: make lint-check

      - name: Determine release version
        id: release_version
        run: uv run python scripts/determine_version.py stable pypi

      - name: Confirm final version
        run: |
          final_version="${{ steps.release_version.outputs.version }}"
          echo "Final version to publish: $final_version"

      - name: Get latest version from PyPI
        id: pypi_version
        run: |
          pypi_version=$(uv run python scripts/version_utils.py get-pypi-latest pypi)
          echo "version=$pypi_version" >> $GITHUB_OUTPUT
          echo "PyPI version: $pypi_version"

      - name: Check if version already exists
        run: uv run python scripts/check_version.py "${{ steps.release_version.outputs.version }}" stable pypi

      - name: Set version for later steps
        id: version
        run: echo "version=${{ steps.release_version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Clean dist directory
        run: rm -rf dist/*

      - name: Build package
        run: uv build

      - name: Check build artifacts
        run: |
          echo "Built packages:"
          ls -la dist/

      - name: Generate build provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            Release v${{ steps.version.outputs.version }}

            Published to PyPI: https://pypi.org/project/freeplay-mcp/${{ steps.version.outputs.version }}/
          files: |
            dist/*.whl
            dist/*.tar.gz
